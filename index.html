<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>📸 My Photos</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0e0e0e;
      --card: #1a1a1a;
      --accent: #f5c842;
      --text: #f0ece3;
      --muted: #888;
      --border: #2e2e2e;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      padding: 40px 20px;
    }
    header {
      text-align: center;
      margin-bottom: 60px;
    }
    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.2rem, 6vw, 4rem);
      color: var(--accent);
      letter-spacing: -1px;
    }
    header p {
      color: var(--muted);
      margin-top: 10px;
      font-size: 1rem;
    }

    /* Section title */
    .section-title {
      text-align: center;
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      color: var(--text);
      margin-bottom: 28px;
    }

    /* Category card */
    .categories {
      display: flex;
      flex-wrap: wrap;
      gap: 28px;
      justify-content: center;
      max-width: 900px;
      margin: 0 auto 60px;
    }

    .cat-card {
      text-decoration: none;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
      width: 260px;
      transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.2s;
      cursor: pointer;
    }
    .cat-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 20px 50px rgba(0,0,0,0.6);
      border-color: var(--accent);
    }
    .cat-card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      display: block;
    }
    .cat-card .card-body {
      padding: 16px 18px 20px;
    }
    .cat-card .card-body .icon {
      font-size: 1.8rem;
      margin-bottom: 6px;
    }
    .cat-card .card-body h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      color: var(--text);
      margin-bottom: 4px;
    }
    .cat-card .card-body p {
      font-size: 0.85rem;
      color: var(--muted);
    }
    .cat-card .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 18px;
      border-top: 1px solid var(--border);
      font-size: 0.85rem;
      color: var(--accent);
      font-weight: 500;
    }

    footer {
      text-align: center;
      margin-top: 20px;
      color: var(--muted);
      font-size: 0.85rem;
    }
  </style>
</head>
<body>

  <header>
    <h1>📸 My Photos</h1>
    <p>Pick a category to browse</p>
  </header>

  <p class="section-title">Categories</p>

  <div class="categories">

    <!-- Cats category card -->
    <a href="https://creapergames1.github.io/Photos/catphotos.html" class="cat-card">
      <img src="https://placecats.com/400/300" alt="Cats preview"/>
      <div class="card-body">
        <div class="icon">🐱</div>
        <h2>Cats</h2>
        <p>Cute cats photos</p>
      </div>
      <div class="card-footer">
        View photos <span>→</span>
      </div>
    </a>

    <!-- Add more categories below! Example:
    <a href="https://creapergames1.github.io/Photos/dogphotos.html" class="cat-card">
      <img src="YOUR_DOG_IMAGE.jpg" alt="Dogs preview"/>
      <div class="card-body">
        <div class="icon">🐶</div>
        <h2>Dogs</h2>
        <p>Cute dog photos</p>
      </div>
      <div class="card-footer">
        View photos <span>→</span>
      </div>
    </a>
    -->

  </div>

  <footer>
    <p>More categories coming soon ✨</p>
  </footer>

</body>
</html>
